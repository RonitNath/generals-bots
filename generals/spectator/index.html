<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GENERALS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --border: #1e2330;
    --text: #c8cdd8;
    --text-dim: #5a6070;
    --accent: #3d9afc;
    --p0: #e04848;
    --p1: #4888e0;
    --mountain: #3a3d48;
    --city-neutral: #6a6e78;
    --empty: #22252e;
    --grid-line: rgba(0,0,0,0.5);
    --glow: 0 0 40px rgba(61,154,252,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Chakra Petch', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* --- LOBBY --- */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 40px;
  }
  #lobby h1 {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: 16px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--p0), var(--accent), var(--p1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #lobby .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  #lobby .server-ip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    color: var(--accent);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 32px;
    border-radius: 4px;
  }
  .player-slots {
    display: flex;
    gap: 60px;
    margin-top: 20px;
  }
  .player-slot {
    width: 280px;
    height: 120px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--text-dim);
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }
  .player-slot.connected {
    border-style: solid;
    color: var(--text);
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 2px;
  }
  .player-slot.p0.connected { border-color: var(--p0); background: rgba(224,72,72,0.08); }
  .player-slot.p1.connected { border-color: var(--p1); background: rgba(72,136,224,0.08); }
  .pulse {
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* --- GAME --- */
  #game { display: none; height: 100vh; flex-direction: column; }

  .scorebar {
    height: 72px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    flex-shrink: 0;
  }
  .scorebar .player-info {
    display: flex;
    align-items: center;
    gap: 16px;
    min-width: 320px;
  }
  .scorebar .player-info.right { flex-direction: row-reverse; text-align: right; }
  .player-color {
    width: 8px;
    height: 42px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .player-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .player-stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-dim);
    display: flex;
    gap: 20px;
  }
  .stat-val { color: var(--text); font-weight: 700; font-size: 16px; }

  .center-info {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .turn-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .turn-num {
    font-size: 28px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .series-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .series-score .wins { font-weight: 700; color: var(--text); }

  .canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  canvas { display: block; }

  /* --- OVERLAYS --- */
  .overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: rgba(10,12,16,0.85);
    backdrop-filter: blur(8px);
  }
  .overlay.visible { display: flex; }

  .winner-card {
    text-align: center;
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .winner-label {
    font-size: 18px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .winner-name {
    font-size: 80px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1;
  }
  .winner-stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--text-dim);
    margin-top: 20px;
  }

  .countdown-text {
    font-size: 120px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    animation: countPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .countdown-sub {
    font-size: 16px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 12px;
    text-align: center;
  }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes countPop {
    from { transform: scale(1.4); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div id="lobby">
  <h1>Generals</h1>
  <div class="subtitle">LAN Arena</div>
  <div class="server-ip" id="serverIp">--</div>
  <div class="player-slots">
    <div class="player-slot p0" id="slot0"><span class="pulse">Waiting...</span></div>
    <div class="player-slot p1" id="slot1"><span class="pulse">Waiting...</span></div>
  </div>
</div>

<div id="game">
  <div class="scorebar">
    <div class="player-info" id="p0info">
      <div class="player-color" id="p0color"></div>
      <div>
        <div class="player-name" id="p0name">--</div>
        <div class="player-stats">
          <span>ARMY <span class="stat-val" id="p0army">0</span></span>
          <span>LAND <span class="stat-val" id="p0land">0</span></span>
        </div>
      </div>
    </div>
    <div class="center-info">
      <div class="turn-label">Turn</div>
      <div class="turn-num" id="turnNum">0</div>
      <div class="series-score" id="seriesScore"></div>
    </div>
    <div class="player-info right" id="p1info">
      <div class="player-color" id="p1color"></div>
      <div>
        <div class="player-name" id="p1name">--</div>
        <div class="player-stats">
          <span>ARMY <span class="stat-val" id="p1army">0</span></span>
          <span>LAND <span class="stat-val" id="p1land">0</span></span>
        </div>
      </div>
    </div>
  </div>
  <div class="canvas-wrap">
    <canvas id="grid"></canvas>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div class="winner-card">
    <div class="winner-label">Winner</div>
    <div class="winner-name" id="winnerName">--</div>
    <div class="winner-stats" id="winnerStats"></div>
  </div>
</div>

<div class="overlay" id="countOverlay">
  <div>
    <div class="countdown-text" id="countNum">5</div>
    <div class="countdown-sub">Next game</div>
  </div>
</div>

// --- State ---
let screen = 'lobby'; // lobby | game | gameOver | countdown
let ws = null;
let gameState = null;  // latest state msg
let gameStart = null;  // game_start msg
let seriesScore = {};
const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');

// Default colors, overridden by game_start
let colors = [[224, 72, 72], [72, 136, 224]];

function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }
function rgba(c, a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }

// --- WebSocket ---
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/`);
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
  ws.onclose = () => setTimeout(connect, 1500);
  ws.onerror = () => ws.close();
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'lobby': showLobby(msg); break;
    case 'game_start': startGame(msg); break;
    case 'state': updateState(msg); break;
    case 'game_end': showGameEnd(msg); break;
    case 'countdown': showCountdown(msg); break;
  }
}

// --- Lobby ---
function showLobby(msg) {
  screen = 'lobby';
  document.getElementById('lobby').style.display = '';
  document.getElementById('game').style.display = 'none';
  hideOverlays();

  if (msg.server_ip) {
    document.getElementById('serverIp').textContent = `${msg.server_ip}:5555`;
  }
  const s0 = document.getElementById('slot0');
  const s1 = document.getElementById('slot1');
  if (msg.players.length >= 1) {
    s0.innerHTML = msg.players[0];
    s0.classList.add('connected');
  } else {
    s0.innerHTML = '<span class="pulse">Waiting...</span>';
    s0.classList.remove('connected');
  }
  if (msg.players.length >= 2) {
    s1.innerHTML = msg.players[1];
    s1.classList.add('connected');
  } else {
    s1.innerHTML = '<span class="pulse">Waiting...</span>';
    s1.classList.remove('connected');
  }
}

// --- Game ---
function startGame(msg) {
  screen = 'game';
  gameStart = msg;
  gameState = null;
  colors = msg.colors || colors;

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  hideOverlays();

  // Set player colors
  document.getElementById('p0color').style.background = rgb(colors[0]);
  document.getElementById('p1color').style.background = rgb(colors[1]);
  document.getElementById('p0name').textContent = msg.agents[0];
  document.getElementById('p1name').textContent = msg.agents[1];
  document.getElementById('p0name').style.color = rgb(colors[0]);
  document.getElementById('p1name').style.color = rgb(colors[1]);

  updateSeriesDisplay();
  sizeCanvas();
  renderGrid();
}

function updateState(msg) {
  if (screen !== 'game' && screen !== 'gameOver') {
    // If we get state while not in game, switch to game
    if (gameStart) {
      screen = 'game';
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game').style.display = 'flex';
      hideOverlays();
    }
  }
  gameState = msg;

  // Update scorebar
  document.getElementById('turnNum').textContent = Math.floor(msg.turn / 2);
  if (msg.stats) {
    document.getElementById('p0army').textContent = msg.stats[0].army;
    document.getElementById('p0land').textContent = msg.stats[0].land;
    document.getElementById('p1army').textContent = msg.stats[1].army;
    document.getElementById('p1land').textContent = msg.stats[1].land;
  }
  renderGrid();
}

function showGameEnd(msg) {
  screen = 'gameOver';
  seriesScore = msg.score || {};
  updateSeriesDisplay();

  const overlay = document.getElementById('winOverlay');
  const nameEl = document.getElementById('winnerName');
  const statsEl = document.getElementById('winnerStats');

  if (msg.winner >= 0 && msg.winner_name) {
    nameEl.textContent = msg.winner_name;
    nameEl.style.color = rgb(colors[msg.winner]);
    // Show final stats if we have them
    let statsText = `${msg.turns} turns`;
    if (gameState && gameState.stats) {
      const w = msg.winner;
      const l = 1 - w;
      statsText += `  ·  ${gameState.stats[w].army} army / ${gameState.stats[w].land} land`;
      statsText += `  vs  ${gameState.stats[l].army} / ${gameState.stats[l].land}`;
    }
    statsEl.textContent = statsText;
  } else {
    nameEl.textContent = 'Draw';
    nameEl.style.color = 'var(--text-dim)';
    statsEl.textContent = `${msg.turns} turns (truncated)`;
  }
  // Re-trigger animation
  const card = document.querySelector('.winner-card');
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = '';
  overlay.classList.add('visible');
}

function showCountdown(msg) {
  screen = 'countdown';
  document.getElementById('winOverlay').classList.remove('visible');
  const overlay = document.getElementById('countOverlay');
  const numEl = document.getElementById('countNum');
  numEl.textContent = msg.seconds;
  // Re-trigger animation
  numEl.style.animation = 'none';
  void numEl.offsetHeight;
  numEl.style.animation = '';
  overlay.classList.add('visible');
}

function hideOverlays() {
  document.getElementById('winOverlay').classList.remove('visible');
  document.getElementById('countOverlay').classList.remove('visible');
}

function updateSeriesDisplay() {
  const el = document.getElementById('seriesScore');
  if (!gameStart || !seriesScore) { el.textContent = ''; return; }
  const a = gameStart.agents;
  const s0 = seriesScore[a[0]] || 0;
  const s1 = seriesScore[a[1]] || 0;
  el.innerHTML = `<span class="wins" style="color:${rgb(colors[0])}">${s0}</span> - <span class="wins" style="color:${rgb(colors[1])}">${s1}</span>`;
}

// --- Canvas Rendering ---
let cellSize = 50;
let gridOffsetX = 0;
let gridOffsetY = 0;

function sizeCanvas() {
  if (!gameStart) return;
  const [H, W] = gameStart.grid_dims;
  const wrap = document.querySelector('.canvas-wrap');
  const maxW = wrap.clientWidth - 40;
  const maxH = wrap.clientHeight - 40;
  cellSize = Math.floor(Math.min(maxW / W, maxH / H));
  canvas.width = cellSize * W;
  canvas.height = cellSize * H;
  gridOffsetX = 0;
  gridOffsetY = 0;
}

function renderGrid() {
  if (!gameStart) return;
  const [H, W] = gameStart.grid_dims;
  const mountains = gameStart.mountains;
  // Use live data for generals/cities (they change on capture), fall back to static
  const cities = gameState?.cities || gameStart.cities;
  const generals = gameState?.generals || gameStart.generals;
  const neutralOwnership = gameState?.ownership_neutral || null;
  const armies = gameState ? gameState.armies : null;
  const ownership = gameState ? gameState.ownership : null;
  const cs = cellSize;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < H; r++) {
    for (let c = 0; c < W; c++) {
      const x = c * cs;
      const y = r * cs;
      const isMtn = mountains[r][c];
      const isCity = cities[r][c];
      const isGen = generals[r][c];
      const owner = ownership ? (ownership[0][r][c] ? 0 : ownership[1][r][c] ? 1 : -1) : -1;
      const isNeutral = neutralOwnership ? neutralOwnership[r][c] : (owner < 0);

      // --- Cell background ---
      if (isMtn) {
        ctx.fillStyle = '#3a3d48';
      } else if (owner >= 0) {
        ctx.fillStyle = rgb(colors[owner]);
      } else if (isCity && isNeutral) {
        ctx.fillStyle = '#6a6e78';
      } else {
        ctx.fillStyle = '#22252e';
      }
      ctx.fillRect(x, y, cs, cs);

      // --- Grid line ---
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, cs - 1, cs - 1);

      // --- Icons (drawn smaller and top-right so they don't obscure the army number) ---
      const hasIcon = isGen || isCity || isMtn;
      if (hasIcon) {
        let icon;
        if (isGen) icon = ASSETS.general;
        else if (isCity) icon = ASSETS.city;
        else icon = ASSETS.mountain;

        if (armies && armies[r][c] > 0 && !isMtn) {
          // Cell has troops — draw icon small in top-right corner
          const smallSize = Math.floor(cs * 0.35);
          const pad = Math.max(2, Math.floor(cs * 0.05));
          ctx.globalAlpha = 0.7;
          ctx.drawImage(icon, x + cs - smallSize - pad, y + pad, smallSize, smallSize);
          ctx.globalAlpha = 1.0;
        } else {
          // Empty structure or mountain — draw icon centered and large
          const iconSize = Math.floor(cs * 0.6);
          const iconOff = Math.floor((cs - iconSize) / 2);
          ctx.drawImage(icon, x + iconOff, y + iconOff, iconSize, iconSize);
        }
      }

      // --- Army number ---
      if (armies && armies[r][c] > 0) {
        const num = armies[r][c];
        const fontSize = num >= 1000 ? Math.floor(cs * 0.26)
                       : num >= 100  ? Math.floor(cs * 0.32)
                       :               Math.floor(cs * 0.40);
        ctx.font = `700 ${fontSize}px 'JetBrains Mono', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // Black outline for readability on any background
        ctx.strokeStyle = 'rgba(0,0,0,0.8)';
        ctx.lineWidth = 3;
        ctx.lineJoin = 'round';
        ctx.strokeText(num, x + cs / 2, y + cs / 2);
        ctx.fillStyle = '#fff';
        ctx.fillText(num, x + cs / 2, y + cs / 2);
      }
    }
  }
}

// --- Init ---
window.addEventListener('resize', () => { sizeCanvas(); renderGrid(); });
connect();
</script>
